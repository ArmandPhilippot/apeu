# Wait until three days after release to install new versions of packages
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@arphi/*"
  # Renovate security update: astro@6.4.6
  - astro@6.4.6
# We don’t need to run these build scripts, so explicitly disallow them as a minor security measure.
allowBuilds:
  cypress: false
  esbuild: false
  sharp: false
  unrs-resolver: false
