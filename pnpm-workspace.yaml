# Wait until three days after release to install new versions of packages
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@arphi/*"
  # Upgrading to v7, to remove once stable.
  - astro@7.0.0-beta.6
  - astrojs/check@0.9.7-beta.1
  - astrojs/compiler-rs@0.2.2
  - astrojs/mdx@7.0.0-beta.4
  - astrojs/node@11.0.0-beta.2
  - astrojs/rss@4.0.15-beta.4
  - astrojs/sitemap@3.6.1-beta.3
  - "@astrojs/markdown-satteri@0.3.1-beta.2"
  - "@astrojs/mdx@7.0.0-beta.4"
  - "@bruits/satteri-darwin-arm64@0.9.0"
  - "@bruits/satteri-darwin-x64@0.9.0"
  - "@bruits/satteri-linux-x64-gnu@0.9.0"
  - "@bruits/satteri-wasm32-wasi@0.9.0"
  - "@bruits/satteri-win32-x64-msvc@0.9.0"
  - satteri@0.9.0
  # Renovate security update: nodemailer@9.0.1
  - nodemailer@9.0.1
# We don’t need to run these build scripts, so explicitly disallow them as a minor security measure.
allowBuilds:
  cypress: false
  esbuild: false
  sharp: false
  unrs-resolver: false
